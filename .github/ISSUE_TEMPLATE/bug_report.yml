name: 🐛 Bug Report
description: Report a bug — Claude will automatically fix it.
title: "[BUG] "
labels:
  - "claude: fix"

body:
  - type: markdown
    attributes:
      value: "## 🤖 Claude Code Agent — Bug Report\nThe more detail you provide, the better the fix."

  - type: textarea
    id: description
    attributes:
      label: What went wrong?
      placeholder: "e.g. App crashes with NullPointerException when tapping Login with a blank password."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Launch the app
        2. Navigate to Login screen
        3. Leave password empty
        4. Tap Login → crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: "Validation error should appear: 'Password cannot be empty'."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour (include stack trace if available)
      placeholder: |
        java.lang.NullPointerException: password must not be null
          at com.example.LoginViewModel.validate(LoginViewModel.kt:47)
    validations:
      required: true

  - type: input
    id: affected_files
    attributes:
      label: Likely Affected File(s)
      description: Optional — helps Claude focus on the right code.
      placeholder: "app/src/main/java/com/example/login/LoginViewModel.kt"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "🔴 Critical — crash / data loss"
        - "🟠 High — feature completely broken"
        - "🟡 Medium — degraded experience"
        - "🟢 Low — cosmetic / minor"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Android Version / Device
      placeholder: "Android 14, Pixel 7 Pro"
