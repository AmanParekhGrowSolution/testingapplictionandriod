name: ✨ Feature Request
description: Request a new feature — Claude will automatically implement it.
title: "[FEAT] "
labels:
  - "claude: implement"

body:
  - type: markdown
    attributes:
      value: "## 🤖 Claude Code Agent — Feature Request\nDescribe the feature clearly. Claude reads every field."

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      placeholder: "e.g. Add a profile screen where users can view and edit their display name and avatar."
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      placeholder: |
        As a logged-in user,
        I want to view and edit my profile,
        So that I can personalise my account.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Profile screen accessible from home screen
        - [ ] Display name editable with 32-character limit
        - [ ] Changes persisted after app restart
        - [ ] Loading and error states handled
    validations:
      required: true

  - type: textarea
    id: ui_description
    attributes:
      label: UI / UX Description
      description: Describe the layout and interactions. Claude applies gradients automatically.
      placeholder: |
        - Full-screen indigo–violet vertical gradient background
        - Circular avatar (100dp) with white border at the top
        - Name in 24sp bold white text below avatar
        - Save button using primary gradient (indigo → violet)

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Architecture notes, existing components to reuse, API endpoints, etc.
      placeholder: "Reuse existing UserRepository. Avatar upload → /api/v1/users/avatar"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "🔴 High — blocking other work"
        - "🟡 Medium — needed soon"
        - "🟢 Low — nice to have"
    validations:
      required: true
