name: 🔄 Auto-Rollback on Main Failure

on:
  push:
    branches: [main]

jobs:
  guard:
    name: Verify main branch health
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - run: chmod +x gradlew

      - name: Build & test
        id: ci
        continue-on-error: true
        run: ./gradlew assembleDebug test --no-daemon

      - name: Revert on failure
        if: steps.ci.outcome == 'failure'
        run: |
          git config user.name  "Claude Agent [bot]"
          git config user.email "claude-agent@users.noreply.github.com"
          FAILED_SHA=$(git rev-parse HEAD)
          echo "FAILED_SHA=$FAILED_SHA" >> $GITHUB_ENV
          git revert --no-commit HEAD
          git commit -m "revert: auto-rollback ${FAILED_SHA:0:7} — CI failure on main [skip ci]"
          git push origin main

      - name: Open incident issue
        if: steps.ci.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const sha    = process.env.FAILED_SHA || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🚨 Auto-rollback — main CI failure (${sha.slice(0,7)})`,
              labels: ['incident'],
              body: [
                '## ⚠️ Automatic Rollback Triggered',
                `Commit \`${sha}\` broke \`main\` and has been **automatically reverted**.`,
                '',
                `| Field | Value |`,
                `|-------|-------|`,
                `| Failed commit | \`${sha}\` |`,
                `| Actions run   | [View logs](${runUrl}) |`,
                '',
                '**Next steps:** Review the log, fix the issue, and re-label the original issue with `claude: fix` to retry.',
              ].join('\n'),
            });
