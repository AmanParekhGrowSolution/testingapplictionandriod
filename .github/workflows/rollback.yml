name: 🔄 Auto-Rollback on Main Failure

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    name: Verify main branch health
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      ci_passed: ${{ steps.ci.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - run: chmod +x gradlew

      - name: Build & test
        id: ci
        continue-on-error: true
        run: ./gradlew assembleDebug test --no-daemon

      - name: Upload APK for delivery
        if: steps.ci.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: deliver-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 1

      - name: Revert on failure
        if: steps.ci.outcome == 'failure'
        run: |
          git config user.name  "Claude Agent [bot]"
          git config user.email "claude-agent@users.noreply.github.com"
          FAILED_SHA=$(git rev-parse HEAD)
          echo "FAILED_SHA=$FAILED_SHA" >> $GITHUB_ENV
          git revert --no-commit HEAD
          git commit -m "revert: auto-rollback ${FAILED_SHA:0:7} — CI failure on main [skip ci]"
          git push origin main

      - name: Open incident issue
        if: steps.ci.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const sha    = process.env.FAILED_SHA || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🚨 Auto-rollback — main CI failure (${sha.slice(0,7)})`,
              labels: ['incident'],
              body: [
                '## ⚠️ Automatic Rollback Triggered',
                `Commit \`${sha}\` broke \`main\` and has been **automatically reverted**.`,
                '',
                `| Field | Value |`,
                `|-------|-------|`,
                `| Failed commit | \`${sha}\` |`,
                `| Actions run   | [View logs](${runUrl}) |`,
                '',
                '**Next steps:** Review the log, fix the issue, and re-label the original issue with `claude: fix` to retry.',
              ].join('\n'),
            });

  deliver:
    name: Publish APK + Slack notify
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.ci_passed == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download APK from guard
        uses: actions/download-artifact@v4
        with:
          name: deliver-apk
          path: ./apk

      - name: Capture build metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          APK_PATH=$(ls ./apk/*.apk | head -n1)
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          SUBJECT=$(git log -1 --pretty=%s)
          AUTHOR=$(git log -1 --pretty='%an')
          echo "short_sha=$SHORT_SHA"   >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH"     >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME"     >> "$GITHUB_OUTPUT"
          echo "apk_size=$APK_SIZE"     >> "$GITHUB_OUTPUT"
          echo "subject=$SUBJECT"       >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR"         >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with APK
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ steps.meta.outputs.short_sha }}"
          gh release create "$TAG" \
            --title "Build ${{ steps.meta.outputs.short_sha }}" \
            --notes "Auto-built debug APK — ${{ steps.meta.outputs.subject }}" \
            "${{ steps.meta.outputs.apk_path }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${{ steps.meta.outputs.apk_name }}"
          echo "download_url=$URL" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          SUBJECT:   ${{ steps.meta.outputs.subject }}
          AUTHOR:    ${{ steps.meta.outputs.author }}
          APK_NAME:  ${{ steps.meta.outputs.apk_name }}
          APK_SIZE:  ${{ steps.meta.outputs.apk_size }}
          APK_URL:   ${{ steps.release.outputs.download_url }}
          TAG:       ${{ steps.release.outputs.tag }}
          REPO_URL:  ${{ github.server_url }}/${{ github.repository }}
        run: |
          PAYLOAD=$(jq -n \
            --arg sha "$SHORT_SHA" \
            --arg subj "$SUBJECT" \
            --arg author "$AUTHOR" \
            --arg name "$APK_NAME" \
            --arg size "$APK_SIZE" \
            --arg url "$APK_URL" \
            --arg tag "$TAG" \
            --arg repo "$REPO_URL" \
            '{
              text: ("New APK: " + $name + " (" + $size + ")"),
              blocks: [
                { type: "header",
                  text: { type: "plain_text", text: ":iphone: New APK delivered" }},
                { type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Commit:*\n<" + $repo + "/commit/" + $sha + "|`" + $sha + "`>") },
                    { type: "mrkdwn", text: ("*Size:*\n"   + $size) },
                    { type: "mrkdwn", text: ("*Author:*\n" + $author) },
                    { type: "mrkdwn", text: ("*Tag:*\n<"   + $repo + "/releases/tag/" + $tag + "|" + $tag + ">") }
                  ]},
                { type: "section",
                  text: { type: "mrkdwn", text: ("*Change:* " + $subj) }},
                { type: "actions",
                  elements: [
                    { type: "button",
                      text: { type: "plain_text", text: ":arrow_down: Download APK" },
                      url: $url, style: "primary" }
                  ]}
              ]
            }')
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
