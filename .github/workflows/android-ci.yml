name: 🤖 Android CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 3

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
      - run: chmod +x gradlew
      - run: ./gradlew test --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: "**/build/reports/tests/"
          retention-days: 7

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
      - run: chmod +x gradlew
      - run: ./gradlew lint --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: "**/build/reports/lint-results*.html"
          retention-days: 7

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const build = '${{ needs.build.result }}';
            const test  = '${{ needs.test.result }}';
            const lint  = '${{ needs.lint.result }}';
            const icon  = r => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';
            const ok    = [build, test, lint].every(r => r === 'success');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## ${ok ? '✅ All CI checks passed' : '❌ CI checks failed'}`,
                '', '| Check | Status |', '|-------|--------|',
                `| Build      | ${icon(build)} ${build} |`,
                `| Unit Tests | ${icon(test)} ${test} |`,
                `| Lint       | ${icon(lint)} ${lint} |`,
                '',
                ok ? '_Auto-merge will now proceed. 🚀_' : '_Auto-merge blocked until all checks pass._',
              ].join('\n'),
            });
